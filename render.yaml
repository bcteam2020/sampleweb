# Render Blueprint — free tier web service
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bluewave-stock
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
